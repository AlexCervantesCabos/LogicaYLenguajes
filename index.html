<script>
const DATA = [{"tema": "Autómatas finitos y lenguajes regulares", "pregunta": "Definir el concepto de autómata determinista.", "respuesta": "Un autómata determinista es una estructura $M=(K,\\Sigma,\\delta,q_0,F)$ donde:\n\\begin{enumerate}\n\\item $K$ es un conjunto finito y no vacío de estados.\n\\item $\\Sigma$ es el alfabeto de entrada.\n\\item $\\delta$ es una función de $K\\times\\Sigma$ en $K$, a la que se denomina función de transición.\n\\item $q_0\\in K$ es el estado inicial.\n\\item $F\\subseteq K$ es el conjunto de estados aceptadores.\n\\end{enumerate}", "respuesta_html": "<p>Un autómata determinista es una estructura $M=(K,\\Sigma,\\delta,q_0,F)$ donde:<br><ol><br><li>$K$ es un conjunto finito y no vacío de estados.<br><li>$\\Sigma$ es el alfabeto de entrada.<br><li>$\\delta$ es una función de $K\\times\\Sigma$ en $K$, a la que se denomina función de transición.<br><li>$q_0\\in K$ es el estado inicial.<br><li>$F\\subseteq K$ es el conjunto de estados aceptadores.<br></ol></p>", "pregunta_html": "<p>Definir el concepto de autómata determinista.</p>"}, {"tema": "Autómatas finitos y lenguajes regulares", "pregunta": "Definir los conceptos de configuración y cómputo en un autómata determinista.", "respuesta": "Si $M=(K,\\Sigma,\\delta,q_0,F)$ es un autómata determinista, definimos una configuración de $M$ como una palabra $px\\in K\\Sigma^*$.\n\nSi $px,qy$ son configuraciones de $M$, decimos que hay un cómputo de $px$ a $qy$, si en $M$ podemos pasar de $px$ a $qy$ aplicando un número finito de veces la función de transición $\\delta$.", "respuesta_html": "<p>Si $M=(K,\\Sigma,\\delta,q_0,F)$ es un autómata determinista, definimos una configuración de $M$ como una palabra $px\\in K\\Sigma^*$.</p>\n<p>Si $px,qy$ son configuraciones de $M$, decimos que hay un cómputo de $px$ a $qy$, si en $M$ podemos pasar de $px$ a $qy$ aplicando un número finito de veces la función de transición $\\delta$.</p>", "pregunta_html": "<p>Definir los conceptos de configuración y cómputo en un autómata determinista.</p>"}, {"tema": "Autómatas finitos y lenguajes regulares", "pregunta": "Definir el concepto de lenguaje asociado a un autómata determinista.", "respuesta": "Sea $M=(K,\\Sigma,\\delta,q_0,F)$ un autómata determinista.\n\nUna palabra $x\\in\\Sigma^*$ es reconocida por $M$, si el cómputo de $M$ para la palabra $x$ termina en un estado aceptador.\n\nDefinimos el lenguaje reconocido por $M$ por $L(M)=\\{x\\in\\Sigma^*:x\\text{ es reconocida por }M\\}$.", "respuesta_html": "<p>Sea $M=(K,\\Sigma,\\delta,q_0,F)$ un autómata determinista.</p>\n<p>Una palabra $x\\in\\Sigma^*$ es reconocida por $M$, si el cómputo de $M$ para la palabra $x$ termina en un estado aceptador.</p>\n<p>Definimos el lenguaje reconocido por $M$ por $L(M)=\\{x\\in\\Sigma^*:x\\text{ es reconocida por }M\\}$.</p>", "pregunta_html": "<p>Definir el concepto de lenguaje asociado a un autómata determinista.</p>"}, {"tema": "Autómatas finitos y lenguajes regulares", "pregunta": "Explicar el algoritmo visto en clase para programar un autómata determinista.", "respuesta": "Para obtener un programa en Java o en C correspondiente a un autómata determinista, podemos proceder de la siguiente manera:\n\\begin{enumerate}\n\\item Representamos a los estados del autómata por números naturales, representando por el 0 al estado inicial.\n\\item Representamos a los símbolos del alfabeto de entrada por caracteres.\n\\item Representamos el cálculo del autómata mediante un bucle “while”, en el que describimos mediante una instrucción “switch-case” las transiciones del autómata en las que cambia el estado.\n\\item Al salir del bucle “while”, comprobamos si el estado en el que estamos es un estado aceptador.\n\\end{enumerate}", "respuesta_html": "<p>Para obtener un programa en Java o en C correspondiente a un autómata determinista, podemos proceder de la siguiente manera:<br><ol><br><li>Representamos a los estados del autómata por números naturales, representando por el 0 al estado inicial.<br><li>Representamos a los símbolos del alfabeto de entrada por caracteres.<br><li>Representamos el cálculo del autómata mediante un bucle \"while\", en el que describimos mediante una instrucción \"switch-case\" las transiciones del autómata en las que cambia el estado.<br><li>Al salir del bucle \"while\", comprobamos si el estado en el que estamos es un estado aceptador.<br></ol></p>", "pregunta_html": "<p>Explicar el algoritmo visto en clase para programar un autómata determinista.</p>"}, {"tema": "Autómatas finitos y lenguajes regulares", "pregunta": "Explicar el interés de los autómatas deterministas.", "respuesta": "Los autómatas deterministas tienen interés, porque se utilizan para diseñar el analizador léxico de un compilador. También, se pueden utilizar para diseñar procesadores de textos. Y, asimismo, se utilizan para diseñar programas eficientes de búsqueda de patrones en textos.", "respuesta_html": "<p>Los autómatas deterministas tienen interés, porque se utilizan para diseñar el analizador léxico de un compilador. También, se pueden utilizar para diseñar procesadores de textos. Y, asimismo, se utilizan para diseñar programas eficientes de búsqueda de patrones en textos.</p>", "pregunta_html": "<p>Explicar el interés de los autómatas deterministas.</p>"}, {"tema": "Autómatas finitos y lenguajes regulares", "pregunta": "Explicar las diferencias existentes entre los autómatas deterministas y los indeterministas.", "respuesta": "En los autómatas indeterministas, se permite que desde cada estado se realizen cero, una o más transiciones para cada símbolo de la entrada, mientras que en el caso determinista se realiza desde cada estado exactamente una transición para cada símbolo de la entrada.\n\nAdemás, en los autómatas indeterministas se permiten transiciones con la palabra vacía, es decir se permite pasar de un estado a otro sin leer ningún símbolo de la entrada.\n\nLos autómatas indeterministas son modelos computacionales equivalentes a los autómatas deterministas, pero más fáciles de diseñar, porque normalmente tienen menos estados y menos transiciones.", "respuesta_html": "<p>En los autómatas indeterministas, se permite que desde cada estado se realizen cero, una o más transiciones para cada símbolo de la entrada, mientras que en el caso determinista se realiza desde cada estado exactamente una transición para cada símbolo de la entrada.</p>\n<p>Además, en los autómatas indeterministas se permiten transiciones con la palabra vacía, es decir se permite pasar de un estado a otro sin leer ningún símbolo de la entrada.</p>\n<p>Los autómatas indeterministas son modelos computacionales equivalentes a los autómatas deterministas, pero más fáciles de diseñar, porque normalmente tienen menos estados y menos transiciones.</p>", "pregunta_html": "<p>Explicar las diferencias existentes entre los autómatas deterministas y los indeterministas.</p>"}, {"tema": "Autómatas finitos y lenguajes regulares", "pregunta": "Explicar el algoritmo visto en clase para transformar un autómata indeterminista en un autómata determinista equivalente.", "respuesta": "Sea $M=(K,\\Sigma,\\Delta,q_0,F)$ un autómata indeterminista. En primer lugar, para todo estado $p\\in K$, definimos $\\Lambda(p)$ como el conjunto de aquellos estados de $K$ a los que podemos llegar desde el estado $p$ sin leer ningún símbolo de la entrada.\n\nDefinimos entonces el autómata determinista $M'$ equivalente a $M$ como $M'=(K',\\Sigma,\\delta',q'_0,F')$ donde:\n\\begin{enumerate}\n\\item $K'=\\mathcal{P}(K)=$ conjunto de subconjuntos de $K$,\n\\item $q'_0=\\Lambda(q_0)$,\n\\item $F'=\\{X\\in K':X\\cap F\\ne\\emptyset\\}$,\n\\item Si $X\\in K'$ y $a\\in\\Sigma$, definimos $\\delta'(X,a)=\\bigcup\\{\\Lambda(q):q\\in K$ y existe un estado $p\\in X$ tal que $(p,a,q)\\in\\Delta\\}$.\n\\end{enumerate}", "respuesta_html": "<p>Sea $M=(K,\\Sigma,\\Delta,q_0,F)$ un autómata indeterminista. En primer lugar, para todo estado $p\\in K$, definimos $\\Lambda(p)$ como el conjunto de aquellos estados de $K$ a los que podemos llegar desde el estado $p$ sin leer ningún símbolo de la entrada.</p>\n<p>Definimos entonces el autómata determinista $M'$ equivalente a $M$ como $M'=(K',\\Sigma,\\delta',q'_0,F')$ donde:<br><ol><br><li>$K'=\\mathcal{P}(K)=$ conjunto de subconjuntos de $K$,<br><li>$q'_0=\\Lambda(q_0)$,<br><li>$F'=\\{X\\in K':X\\cap F\\ne\\emptyset\\}$,<br><li>Si $X\\in K'$ y $a\\in\\Sigma$, definimos $\\delta'(X,a)=\\bigcup\\{\\Lambda(q):q\\in K$ y existe un estado $p\\in X$ tal que $(p,a,q)\\in\\Delta\\}$.<br></ol></p>", "pregunta_html": "<p>Explicar el algoritmo visto en clase para transformar un autómata indeterminista en un autómata determinista equivalente.</p>"}, {"tema": "Autómatas finitos y lenguajes regulares", "pregunta": "Explicar las diferentes maneras en que se puede definir el concepto de lenguaje regular", "respuesta": "Se puede definir mediante el concepto de expresión regular, ya que un lenguaje $L$ es regular, si existe una expresión regular $\\alpha$ tal que $L(\\alpha)=L$.\n\nTambién, se puede definir mediante el concepto de autómata determinista, ya que por un teorema visto en clase, sabemos que el concepto de expresión regular es equivalente al concepto de autómata determinista.\n\nAsimismo, se puede definir mediante el concepto de autómata indeterminista, ya que por otro teorema visto en clase, sabemos que el concepto de autómata determinista es equivalente al concepto de autómata indeterminista.\n\nY también se puede definir mediante el concepto de gramática regular, ya que por otro teorema visto en clase, sabemos que el concepto de gramática regular es equivalente al concepto de autómata determinista.", "respuesta_html": "<p>Se puede definir mediante el concepto de expresión regular, ya que un lenguaje $L$ es regular, si existe una expresión regular $\\alpha$ tal que $L(\\alpha)=L$.</p>\n<p>También, se puede definir mediante el concepto de autómata determinista, ya que por un teorema visto en clase, sabemos que el concepto de expresión regular es equivalente al concepto de autómata determinista.</p>\n<p>Asimismo, se puede definir mediante el concepto de autómata indeterminista, ya que por otro teorema visto en clase, sabemos que el concepto de autómata determinista es equivalente al concepto de autómata indeterminista.</p>\n<p>Y también se puede definir mediante el concepto de gramática regular, ya que por otro teorema visto en clase, sabemos que el concepto de gramática regular es equivalente al concepto de autómata determinista.</p>", "pregunta_html": "<p>Explicar las diferentes maneras en que se puede definir el concepto de lenguaje regular</p>"}, {"tema": "Autómatas finitos y lenguajes regulares", "pregunta": "Describir las categorías sintácticas de un lenguaje de programación y explicar su utilidad en el diseño de compiladores", "respuesta": "Las categorías sintácticas (o tokens) de un lenguaje de programación son la clase de los identificadores, cada tipo de datos del lenguaje de programación (tipo integer, tipo float, tipo char, etc), cada símbolo relacional, cada operador aritmético, cada símbolo de puntuación y cada palabra reservada.\n\nLas categorías sintácticas se utilizan para simplificar la fase del compilador del análisis sintáctico, en la cual se determina si un programa escrito en un lenguaje de programación de alto nivel está correctamente escrito con respecto a las reglas que tenga dicho lenguaje de programación.", "respuesta_html": "<p>Las categorías sintácticas (o tokens) de un lenguaje de programación son la clase de los identificadores, cada tipo de datos del lenguaje de programación (tipo integer, tipo float, tipo char, etc), cada símbolo relacional, cada operador aritmético, cada símbolo de puntuación y cada palabra reservada.</p>\n<p>Las categorías sintácticas se utilizan para simplificar la fase del compilador del análisis sintáctico, en la cual se determina si un programa escrito en un lenguaje de programación de alto nivel está correctamente escrito con respecto a las reglas que tenga dicho lenguaje de programación.</p>", "pregunta_html": "<p>Describir las categorías sintácticas de un lenguaje de programación y explicar su utilidad en el diseño de compiladores</p>"}, {"tema": "Autómatas finitos y lenguajes regulares", "pregunta": "Definir autómatas indeterministas que reconozcan el conjunto de identificadores de C y el tipo integer", "respuesta": "Para simplificar la construcción, denotamos por $l$ a cualquier letra y por $d$ a cualquier dígito. Tenemos el siguiente autómata para reconocer los identificadores de C:\n\n\\begin{center}\n\\begin{tikzpicture}[node distance=1.55cm,baseline]\n\\node[state,initial] (q0) {$q_0$};\n\\node[state,accepting,right=of q0] (q1) {$q_1$};\n\\path[->] (q0) edge node[above] {$l,$} (q1)\n          (q1) edge[loop above] node {$l,d,$} (q1);\n\\end{tikzpicture}\n\\end{center}\n\nY tenemos el siguiente autómata para reconocer el tipo integer:\n\n\\begin{center}\n\\begin{tikzpicture}[node distance=1.45cm,baseline]\n\\node[state,initial] (q0) {$q_0$};\n\\node[state,right=of q0] (q1) {$q_1$};\n\\node[state,accepting,right=of q1] (q2) {$q_2$};\n\\path[->] (q0) edge node[above] {$+,-$} (q1)\n          (q0) edge[bend left=35] node[above] {$d$} (q2)\n          (q1) edge node[above] {$d$} (q2)\n          (q2) edge[loop above] node {$d$} (q2);\n\\end{tikzpicture}\n\\end{center}", "respuesta_html": "<p>Para simplificar la construcción, denotamos por $l$ a cualquier letra y por $d$ a cualquier dígito. Tenemos el siguiente autómata para reconocer los identificadores de C:</p>\n<pre class=\"latex-code\">\\begin{tikzpicture}[node distance=1.55cm,baseline]\n\\node[state,initial] (q0) {$q_0$};\n\\node[state,accepting,right=of q0] (q1) {$q_1$};\n\\path[-&gt;] (q0) edge node[above] {$l,$} (q1)\n          (q1) edge[loop above] node {$l,d,$} (q1);\n\\end{tikzpicture}</pre>\n<p>Y tenemos el siguiente autómata para reconocer el tipo integer:</p>\n<pre class=\"latex-code\">\\begin{tikzpicture}[node distance=1.45cm,baseline]\n\\node[state,initial] (q0) {$q_0$};\n\\node[state,right=of q0] (q1) {$q_1$};\n\\node[state,accepting,right=of q1] (q2) {$q_2$};\n\\path[-&gt;] (q0) edge node[above] {$+,-$} (q1)\n          (q0) edge[bend left=35] node[above] {$d$} (q2)\n          (q1) edge node[above] {$d$} (q2)\n          (q2) edge[loop above] node {$d$} (q2);\n\\end{tikzpicture}</pre>", "pregunta_html": "<p>Definir autómatas indeterministas que reconozcan el conjunto de identificadores de C y el tipo integer</p>"}, {"tema": "Autómatas con pila y gramáticas incontextuales", "pregunta": "Definir el concepto de autómata con pila, y explicar cuando una palabra es reconocida por un autómata con pila", "respuesta": "Un autómata con pila es una estructura $M=(K,\\Sigma,\\Gamma,\\Delta,q_0,F)$ donde:\n\\begin{enumerate}\n\\item $K$ es un conjunto finito y no vacío de estados,\n\\item $\\Sigma$ es el alfabeto de entrada,\n\\item $\\Gamma$ es el alfabeto de la pila,\n\\item $q_0\\in K$ es el estado inicial,\n\\item $F\\subseteq K$ es el conjunto de estados aceptadores,\n\\item $\\Delta$ es un conjunto finito de elementos de la forma $((p,a,b),(q,x))$ donde $p,q\\in K$, $a\\in\\Sigma\\cup\\{\\lambda\\}$, $b\\in\\Gamma\\cup\\{\\lambda\\}$ y $x\\in\\Gamma^*$.\n\\end{enumerate}\n\nSi $M=(K,\\Sigma,\\Gamma,\\Delta,q_0,F)$ es un autómata con pila, decimos que una palabra $x\\in\\Sigma^*$ es reconocida por $M$, si existe un cómputo para la entrada $x$ que termina en un estado aceptador, lee toda la palabra de entrada y deja la pila vacía al final del cómputo.", "respuesta_html": "<p>Un autómata con pila es una estructura $M=(K,\\Sigma,\\Gamma,\\Delta,q_0,F)$ donde:<br><ol><br><li>$K$ es un conjunto finito y no vacío de estados,<br><li>$\\Sigma$ es el alfabeto de entrada,<br><li>$\\Gamma$ es el alfabeto de la pila,<br><li>$q_0\\in K$ es el estado inicial,<br><li>$F\\subseteq K$ es el conjunto de estados aceptadores,<br><li>$\\Delta$ es un conjunto finito de elementos de la forma $((p,a,b),(q,x))$ donde $p,q\\in K$, $a\\in\\Sigma\\cup\\{\\lambda\\}$, $b\\in\\Gamma\\cup\\{\\lambda\\}$ y $x\\in\\Gamma^*$.<br></ol></p>\n<p>Si $M=(K,\\Sigma,\\Gamma,\\Delta,q_0,F)$ es un autómata con pila, decimos que una palabra $x\\in\\Sigma^*$ es reconocida por $M$, si existe un cómputo para la entrada $x$ que termina en un estado aceptador, lee toda la palabra de entrada y deja la pila vacía al final del cómputo.</p>", "pregunta_html": "<p>Definir el concepto de autómata con pila, y explicar cuando una palabra es reconocida por un autómata con pila</p>"}, {"tema": "Autómatas con pila y gramáticas incontextuales", "pregunta": "Definir el concepto de autómata con pila determinista", "respuesta": "Decimos que un autómata con pila es determinista, cuando hay un solo cálculo posible del autómata para cada palabra de la entrada.\n\nEn el caso de que un autómata con pila sea determinista, cada palabra tendrá como mucho un árbol de computación, mientras que en el caso de que el autómata no sea determinista, una palabra puede tener más de un árbol de computación.", "respuesta_html": "<p>Decimos que un autómata con pila es determinista, cuando hay un solo cálculo posible del autómata para cada palabra de la entrada.</p>\n<p>En el caso de que un autómata con pila sea determinista, cada palabra tendrá como mucho un árbol de computación, mientras que en el caso de que el autómata no sea determinista, una palabra puede tener más de un árbol de computación.</p>", "pregunta_html": "<p>Definir el concepto de autómata con pila determinista</p>"}, {"tema": "Autómatas con pila y gramáticas incontextuales", "pregunta": "Definir el concepto de gramática incontextual y explicar la relación existente entre los lenguajes incontextuales y los autómatas con pila", "respuesta": "Una gramática incontextual es una estructura $G=(V,\\Sigma,P,S)$ donde:\n\\begin{enumerate}\n\\item $V$ es un conjunto finito y no vacío de variables,\n\\item $\\Sigma$ es un conjunto finito de símbolos, denominados símbolos terminales, tal que $V\\cap\\Sigma=\\emptyset$,\n\\item $S\\in V$ es la variable inicial,\n\\item $P$ es un conjunto finito de producciones de la forma $A\\longrightarrow u$, donde $A\\in V$ y $u\\in(V\\cup\\Sigma)^*$.\n\\end{enumerate}\n\nDada una gramática incontextual $G$, denominamos lenguaje generado por $G$, y lo denotamos por $L(G)$, al conjunto de las palabras formadas por símbolos de $\\Sigma$ que se pueden generar a partir del símbolo inicial $S$, aplicando producciones de la gramática.\n\nUn lenguaje $L$ es incontextual si existe una gramática incontextual $G$ tal que $L(G)=L$.\n\nLos lenguajes generados por gramáticas incontextuales son los lenguajes reconocidos por los autómatas con pila.", "respuesta_html": "<p>Una gramática incontextual es una estructura $G=(V,\\Sigma,P,S)$ donde:<br><ol><br><li>$V$ es un conjunto finito y no vacío de variables,<br><li>$\\Sigma$ es un conjunto finito de símbolos, denominados símbolos terminales, tal que $V\\cap\\Sigma=\\emptyset$,<br><li>$S\\in V$ es la variable inicial,<br><li>$P$ es un conjunto finito de producciones de la forma $A\\longrightarrow u$, donde $A\\in V$ y $u\\in(V\\cup\\Sigma)^*$.<br></ol></p>\n<p>Dada una gramática incontextual $G$, denominamos lenguaje generado por $G$, y lo denotamos por $L(G)$, al conjunto de las palabras formadas por símbolos de $\\Sigma$ que se pueden generar a partir del símbolo inicial $S$, aplicando producciones de la gramática.</p>\n<p>Un lenguaje $L$ es incontextual si existe una gramática incontextual $G$ tal que $L(G)=L$.</p>\n<p>Los lenguajes generados por gramáticas incontextuales son los lenguajes reconocidos por los autómatas con pila.</p>", "pregunta_html": "<p>Definir el concepto de gramática incontextual y explicar la relación existente entre los lenguajes incontextuales y los autómatas con pila</p>"}, {"tema": "Autómatas con pila y gramáticas incontextuales", "pregunta": "Definir el concepto de derivación en una gramática incontextual", "respuesta": "Sea $G=(V,\\Sigma,P,S)$ una gramática incontextual. Dadas dos palabras $x,y\\in(V\\cup\\Sigma)^*$, decimos que hay un paso de derivación de $x$ a $y$, y lo denotamos por $x\\Rightarrow_G y$, si existen palabras $u,v,w\\in(V\\cup\\Sigma)^*$ y una producción $A\\to w$ tales que $x=uAv$ y $y=uwv$.\n\nCuando no haya confusión respecto de la gramática, escribimos simplemente $x\\Rightarrow y$.\n\nDecimos que hay una derivación de $x$ a $y$, y lo denotamos por $x\\Rightarrow_G^* y$, si hay una sucesión finita de pasos de derivación que transforma $x$ en $y$.", "respuesta_html": "<p>Sea $G=(V,\\Sigma,P,S)$ una gramática incontextual. Dadas dos palabras $x,y\\in(V\\cup\\Sigma)^*$, decimos que hay un paso de derivación de $x$ a $y$, y lo denotamos por $x\\Rightarrow_G y$, si existen palabras $u,v,w\\in(V\\cup\\Sigma)^*$ y una producción $A\\to w$ tales que $x=uAv$ y $y=uwv$.</p>\n<p>Cuando no haya confusión respecto de la gramática, escribimos simplemente $x\\Rightarrow y$.</p>\n<p>Decimos que hay una derivación de $x$ a $y$, y lo denotamos por $x\\Rightarrow_G^* y$, si hay una sucesión finita de pasos de derivación que transforma $x$ en $y$.</p>", "pregunta_html": "<p>Definir el concepto de derivación en una gramática incontextual</p>"}, {"tema": "Autómatas con pila y gramáticas incontextuales", "pregunta": "Mostrar el algoritmo visto en clase para construir un autómata con pila equivalente a una gramática incontextual", "respuesta": "Sea $G=(V,\\Sigma,P,S)$ una gramática incontextual. Definimos el autómata con pila $M=(K,\\Sigma,\\Gamma,\\Delta,q_0,F)$ donde $K=\\{q\\}$, $\\Gamma=V\\cup\\Sigma$, $q_0=q$ y $F=\\{q\\}$.\n\nLas transiciones de $M$ se definen de la siguiente manera:\n\\begin{enumerate}\n\\item Para cada producción $A\\to w$ de $P$, incluimos la transición $((q,\\lambda,A),(q,w))$ en $\\Delta$.\n\\item Para cada $a\\in\\Sigma$, incluimos la transición $((q,a,a),(q,\\lambda))$ en $\\Delta$.\n\\item Incluimos también la transición $((q,\\lambda,\\lambda),(q,S))$ en $\\Delta$.\n\\end{enumerate}", "respuesta_html": "<p>Sea $G=(V,\\Sigma,P,S)$ una gramática incontextual. Definimos el autómata con pila $M=(K,\\Sigma,\\Gamma,\\Delta,q_0,F)$ donde $K=\\{q\\}$, $\\Gamma=V\\cup\\Sigma$, $q_0=q$ y $F=\\{q\\}$.</p>\n<p>Las transiciones de $M$ se definen de la siguiente manera:<br><ol><br><li>Para cada producción $A\\to w$ de $P$, incluimos la transición $((q,\\lambda,A),(q,w))$ en $\\Delta$.<br><li>Para cada $a\\in\\Sigma$, incluimos la transición $((q,a,a),(q,\\lambda))$ en $\\Delta$.<br><li>Incluimos también la transición $((q,\\lambda,\\lambda),(q,S))$ en $\\Delta$.<br></ol></p>", "pregunta_html": "<p>Mostrar el algoritmo visto en clase para construir un autómata con pila equivalente a una gramática incontextual</p>"}, {"tema": "Autómatas con pila y gramáticas incontextuales", "pregunta": "Definir los conceptos de árbol de derivación y gramática ambigua, y explicar por qué son importantes estos conceptos en el diseño de compiladores", "respuesta": "Un árbol de derivación de una palabra $w$ en una gramática incontextual es un árbol que representa gráficamente una derivación de $w$ a partir del símbolo inicial, mostrando qué producciones se han aplicado.\n\nUna gramática incontextual se dice ambigua si existe al menos una palabra del lenguaje generado por la gramática que tiene dos árboles de derivación diferentes.\n\nEstos conceptos son importantes en el diseño de compiladores porque, si la gramática del lenguaje de programación es ambigua, entonces puede haber programas con más de una interpretación sintáctica, lo que puede hacer imposible o incorrecto el análisis sintáctico.", "respuesta_html": "<p>Un árbol de derivación de una palabra $w$ en una gramática incontextual es un árbol que representa gráficamente una derivación de $w$ a partir del símbolo inicial, mostrando qué producciones se han aplicado.</p>\n<p>Una gramática incontextual se dice ambigua si existe al menos una palabra del lenguaje generado por la gramática que tiene dos árboles de derivación diferentes.</p>\n<p>Estos conceptos son importantes en el diseño de compiladores porque, si la gramática del lenguaje de programación es ambigua, entonces puede haber programas con más de una interpretación sintáctica, lo que puede hacer imposible o incorrecto el análisis sintáctico.</p>", "pregunta_html": "<p>Definir los conceptos de árbol de derivación y gramática ambigua, y explicar por qué son importantes estos conceptos en el diseño de compiladores</p>"}, {"tema": "Autómatas con pila y gramáticas incontextuales", "pregunta": "Demostrar que es ambigua la gramática incontextual definida por las dos siguientes producciones: $S\\to a$ y $S\\to S+S$.", "respuesta": "Tenemos que demostrar que hay una palabra que tenga dos árboles de derivación diferentes.\n\nTomamos la palabra $a+a+a$. Esta palabra se puede derivar de dos maneras distintas:\n\nPrimera derivación:\n\n$S\\Rightarrow S+S\\Rightarrow a+S\\Rightarrow a+S+S\\Rightarrow a+a+S\\Rightarrow a+a+a$.\n\nSegunda derivación:\n\n$S\\Rightarrow S+S\\Rightarrow S+S+S\\Rightarrow a+S+S\\Rightarrow a+a+S\\Rightarrow a+a+a$.\n\nEstas dos derivaciones corresponden a dos agrupaciones distintas: $(a+a)+a$ y $a+(a+a)$. Por tanto, la gramática es ambigua.", "respuesta_html": "<p>Tenemos que demostrar que hay una palabra que tenga dos árboles de derivación diferentes.</p>\n<p>Tomamos la palabra $a+a+a$. Esta palabra se puede derivar de dos maneras distintas:</p>\n<p>Primera derivación:</p>\n<p>$S\\Rightarrow S+S\\Rightarrow a+S\\Rightarrow a+S+S\\Rightarrow a+a+S\\Rightarrow a+a+a$.</p>\n<p>Segunda derivación:</p>\n<p>$S\\Rightarrow S+S\\Rightarrow S+S+S\\Rightarrow a+S+S\\Rightarrow a+a+S\\Rightarrow a+a+a$.</p>\n<p>Estas dos derivaciones corresponden a dos agrupaciones distintas: $(a+a)+a$ y $a+(a+a)$. Por tanto, la gramática es ambigua.</p>", "pregunta_html": "<p>Demostrar que es ambigua la gramática incontextual definida por las dos siguientes producciones: $S\\to a$ y $S\\to S+S$.</p>"}, {"tema": "Autómatas con pila y gramáticas incontextuales", "pregunta": "Explicar en qué consisten las tres fases del diseño de un compilador y en qué fase se utilizan los autómatas con pila", "respuesta": "Las tres fases principales del diseño de un compilador son:\n\\begin{enumerate}\n\\item Análisis léxico: divide el programa fuente en tokens o categorías sintácticas.\n\\item Análisis sintáctico: comprueba que la secuencia de tokens cumple las reglas gramaticales del lenguaje.\n\\item Generación de código: produce el código equivalente en otro lenguaje o en código máquina.\n\\end{enumerate}\n\nLos autómatas con pila se utilizan en la fase de análisis sintáctico, porque esta fase se basa en gramáticas incontextuales.", "respuesta_html": "<p>Las tres fases principales del diseño de un compilador son:<br><ol><br><li>Análisis léxico: divide el programa fuente en tokens o categorías sintácticas.<br><li>Análisis sintáctico: comprueba que la secuencia de tokens cumple las reglas gramaticales del lenguaje.<br><li>Generación de código: produce el código equivalente en otro lenguaje o en código máquina.<br></ol></p>\n<p>Los autómatas con pila se utilizan en la fase de análisis sintáctico, porque esta fase se basa en gramáticas incontextuales.</p>", "pregunta_html": "<p>Explicar en qué consisten las tres fases del diseño de un compilador y en qué fase se utilizan los autómatas con pila</p>"}, {"tema": "Autómatas con pila y gramáticas incontextuales", "pregunta": "Explicar el interés que tiene el diseño de compiladores para la programación", "respuesta": "El diseño de compiladores tiene interés para la programación porque muchos de los programas que se diseñan en la práctica son similares a un compilador.\n\nEn general, todo programa que recibe como entrada un texto estructurado, analiza su estructura y genera una salida a partir de él utiliza ideas parecidas a las del diseño de compiladores.", "respuesta_html": "<p>El diseño de compiladores tiene interés para la programación porque muchos de los programas que se diseñan en la práctica son similares a un compilador.</p>\n<p>En general, todo programa que recibe como entrada un texto estructurado, analiza su estructura y genera una salida a partir de él utiliza ideas parecidas a las del diseño de compiladores.</p>", "pregunta_html": "<p>Explicar el interés que tiene el diseño de compiladores para la programación</p>"}, {"tema": "Autómatas con pila y gramáticas incontextuales", "pregunta": "Mostrar el algoritmo visto en clase para diseñar un analizador sintáctico", "respuesta": "Para diseñar un analizador sintáctico a partir de una gramática incontextual $G$, se procede así:\n\\begin{enumerate}\n\\item Se construye el autómata con pila asociado a la gramática.\n\\item Se intenta hacer determinista dicho autómata con pila.\n\\item Si se consigue obtener un autómata con pila determinista, entonces se puede programar dicho autómata y obtener así un analizador sintáctico.\n\\end{enumerate}", "respuesta_html": "<p>Para diseñar un analizador sintáctico a partir de una gramática incontextual $G$, se procede así:<br><ol><br><li>Se construye el autómata con pila asociado a la gramática.<br><li>Se intenta hacer determinista dicho autómata con pila.<br><li>Si se consigue obtener un autómata con pila determinista, entonces se puede programar dicho autómata y obtener así un analizador sintáctico.<br></ol></p>", "pregunta_html": "<p>Mostrar el algoritmo visto en clase para diseñar un analizador sintáctico</p>"}, {"tema": "Autómatas con pila y gramáticas incontextuales", "pregunta": "Explicar cómo se construye la tabla de análisis de una gramática incontextual", "respuesta": "Para construir la tabla de análisis se utiliza una fila para cada variable de la gramática y una columna para cada símbolo terminal, además de una columna para el símbolo de fin de palabra.\n\nPara cada producción $A\\to u$:\n\\begin{enumerate}\n\\item Se calculan los primeros símbolos terminales que pueden aparecer al derivar desde $u$.\n\\item Si un terminal $a$ pertenece a $Primeros(u)$, se coloca la producción $A\\to u$ en la celda $(A,a)$.\n\\item Si $u$ puede derivar la palabra vacía, entonces se coloca también la producción en las columnas correspondientes a los símbolos de $Siguientes(A)$.\n\\end{enumerate}\n\nSi en alguna celda aparece más de una producción, la gramática no es LL(1).", "respuesta_html": "<p>Para construir la tabla de análisis se utiliza una fila para cada variable de la gramática y una columna para cada símbolo terminal, además de una columna para el símbolo de fin de palabra.</p>\n<p>Para cada producción $A\\to u$:<br><ol><br><li>Se calculan los primeros símbolos terminales que pueden aparecer al derivar desde $u$.<br><li>Si un terminal $a$ pertenece a $Primeros(u)$, se coloca la producción $A\\to u$ en la celda $(A,a)$.<br><li>Si $u$ puede derivar la palabra vacía, entonces se coloca también la producción en las columnas correspondientes a los símbolos de $Siguientes(A)$.<br></ol></p>\n<p>Si en alguna celda aparece más de una producción, la gramática no es LL(1).</p>", "pregunta_html": "<p>Explicar cómo se construye la tabla de análisis de una gramática incontextual</p>"}, {"tema": "Autómatas con pila y gramáticas incontextuales", "pregunta": "Definir el concepto de gramática LL(1) y explicar el interés de las gramáticas LL(1)", "respuesta": "Una gramática incontextual se dice LL(1) si su tabla de análisis no tiene conflictos, es decir, si en cada celda de la tabla aparece como mucho una producción.\n\nLas gramáticas LL(1) son importantes porque permiten diseñar analizadores sintácticos predictivos y deterministas, que pueden decidir qué producción aplicar mirando únicamente el símbolo de entrada actual y el símbolo superior de la pila.", "respuesta_html": "<p>Una gramática incontextual se dice LL(1) si su tabla de análisis no tiene conflictos, es decir, si en cada celda de la tabla aparece como mucho una producción.</p>\n<p>Las gramáticas LL(1) son importantes porque permiten diseñar analizadores sintácticos predictivos y deterministas, que pueden decidir qué producción aplicar mirando únicamente el símbolo de entrada actual y el símbolo superior de la pila.</p>", "pregunta_html": "<p>Definir el concepto de gramática LL(1) y explicar el interés de las gramáticas LL(1)</p>"}, {"tema": "Autómatas con pila y gramáticas incontextuales", "pregunta": "Explicar el algoritmo visto en clase para programar el autómata con pila asociado a una gramática LL(1)", "respuesta": "Para programar el autómata con pila asociado a una gramática LL(1), se procede de la siguiente manera:\n\\begin{enumerate}\n\\item La pila contiene inicialmente el símbolo inicial de la gramática.\n\\item Se mira el símbolo que está en la cima de la pila.\n\\item Si la cima de la pila es un símbolo terminal, se compara con el símbolo actual de la entrada. Si coinciden, se desapila y se avanza en la entrada.\n\\item Si la cima de la pila es una variable, se consulta la tabla LL(1) usando esa variable y el símbolo actual de entrada.\n\\item La producción encontrada en la tabla se aplica sustituyendo la variable de la cima por la parte derecha de la producción.\n\\item Si la pila queda vacía y se ha leído toda la entrada, la palabra se acepta.\n\\end{enumerate}", "respuesta_html": "<p>Para programar el autómata con pila asociado a una gramática LL(1), se procede de la siguiente manera:<br><ol><br><li>La pila contiene inicialmente el símbolo inicial de la gramática.<br><li>Se mira el símbolo que está en la cima de la pila.<br><li>Si la cima de la pila es un símbolo terminal, se compara con el símbolo actual de la entrada. Si coinciden, se desapila y se avanza en la entrada.<br><li>Si la cima de la pila es una variable, se consulta la tabla LL(1) usando esa variable y el símbolo actual de entrada.<br><li>La producción encontrada en la tabla se aplica sustituyendo la variable de la cima por la parte derecha de la producción.<br><li>Si la pila queda vacía y se ha leído toda la entrada, la palabra se acepta.<br></ol></p>", "pregunta_html": "<p>Explicar el algoritmo visto en clase para programar el autómata con pila asociado a una gramática LL(1)</p>"}, {"tema": "Autómatas con pila y gramáticas incontextuales", "pregunta": "Explicar en qué consiste la regla de factorización", "respuesta": "La regla de factorización se aplica cuando una variable tiene varias producciones con un prefijo común.\n\nSi tenemos:\n\n$A\\to ux_1\\mid ux_2\\mid\\cdots\\mid ux_n$,\n\nse reemplaza por:\n\n$A\\to uA'$\n\n$A'\\to x_1\\mid x_2\\mid\\cdots\\mid x_n$.\n\nCon esto se retrasa la decisión hasta después de haber leído el prefijo común $u$.", "respuesta_html": "<p>La regla de factorización se aplica cuando una variable tiene varias producciones con un prefijo común.</p>\n<p>Si tenemos:</p>\n<p>$A\\to ux_1\\mid ux_2\\mid\\cdots\\mid ux_n$,</p>\n<p>se reemplaza por:</p>\n<p>$A\\to uA'$</p>\n<p>$A'\\to x_1\\mid x_2\\mid\\cdots\\mid x_n$.</p>\n<p>Con esto se retrasa la decisión hasta después de haber leído el prefijo común $u$.</p>", "pregunta_html": "<p>Explicar en qué consiste la regla de factorización</p>"}, {"tema": "Autómatas con pila y gramáticas incontextuales", "pregunta": "Explicar en qué consiste la regla de recursión", "respuesta": "La regla de recursión, o eliminación de la recursión izquierda, se aplica cuando una variable tiene producciones de la forma:\n\n$A\\to A\\alpha_1\\mid\\cdots\\mid A\\alpha_n\\mid\\beta_1\\mid\\cdots\\mid\\beta_m$,\n\ndonde las $\\beta_i$ no empiezan por $A$.\n\nSe reemplazan por:\n\n$A\\to\\beta_1A'\\mid\\cdots\\mid\\beta_mA'$\n\n$A'\\to\\alpha_1A'\\mid\\cdots\\mid\\alpha_nA'\\mid\\lambda$.\n\nCon ello se elimina la recursión izquierda, que impide que una gramática sea LL(1).", "respuesta_html": "<p>La regla de recursión, o eliminación de la recursión izquierda, se aplica cuando una variable tiene producciones de la forma:</p>\n<p>$A\\to A\\alpha_1\\mid\\cdots\\mid A\\alpha_n\\mid\\beta_1\\mid\\cdots\\mid\\beta_m$,</p>\n<p>donde las $\\beta_i$ no empiezan por $A$.</p>\n<p>Se reemplazan por:</p>\n<p>$A\\to\\beta_1A'\\mid\\cdots\\mid\\beta_mA'$</p>\n<p>$A'\\to\\alpha_1A'\\mid\\cdots\\mid\\alpha_nA'\\mid\\lambda$.</p>\n<p>Con ello se elimina la recursión izquierda, que impide que una gramática sea LL(1).</p>", "pregunta_html": "<p>Explicar en qué consiste la regla de recursión</p>"}];
let orden = [...DATA.keys()];
let idx = 0;
const $ = id => document.getElementById(id);
const temas = ['Todos', ...Array.from(new Set(DATA.map(x => x.tema)))];
$('tema').innerHTML = temas.map(t => `<option>${t}</option>`).join('');
function visibles() { const t=$('tema').value; return DATA.map((x,i)=>[x,i]).filter(([x])=>t==='Todos'||x.tema===t).map(([,i])=>i); }
function typeset() { if (window.MathJax) MathJax.typesetPromise(); }
function render() {
  if (!orden.length) orden=visibles();
  idx = Math.max(0, Math.min(idx, orden.length-1));
  const item = DATA[orden[idx]];
  $('card').classList.remove('flipped');
  $('temaActual').textContent = item.tema;
  $('contador').textContent = `${idx+1} / ${orden.length}`;
  $('pregunta').innerHTML = item.pregunta_html;
  $('respuesta').innerHTML = item.respuesta_html;
  typeset();
}
function shuffle(a) { for(let i=a.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; } return a; }
$('flip').onclick = () => $('card').classList.toggle('flipped');
$('front').onclick = () => $('card').classList.remove('flipped');
$('next').onclick = () => { idx=(idx+1)%orden.length; render(); };
$('prev').onclick = () => { idx=(idx-1+orden.length)%orden.length; render(); };
$('shuffle').onclick = () => { orden=shuffle(visibles()); idx=0; render(); };
$('tema').onchange = () => { orden=visibles(); idx=0; render(); };
document.addEventListener('keydown', e => {
  if (e.key === ' ') { e.preventDefault(); $('flip').click(); }
  if (e.key === 'ArrowRight') $('next').click();
  if (e.key === 'ArrowLeft') $('prev').click();
  if (e.key.toLowerCase() === 'm') $('shuffle').click();
});
render();
</script>
</body>
</html>
